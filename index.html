<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radha Internations</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#eef3ff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      background:white;
      width:450px;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    .banner img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:25px;
    }

    .logo{
      text-align:center;
      margin-top:-60px;
      margin-bottom:10px;
    }

    .logo img{
      width:100px;
      height:100px;
      border-radius:50%;
      border:4px solid white;
      object-fit:cover;
      background:white;
    }

    h1{
      text-align:center;
      color:#1d4ed8;
      margin-bottom:5px;
    }

    h2{
      text-align:center;
      color:#444;
      margin-bottom:20px;
      font-size:20px;
    }

    label{
      display:block;
      margin-top:12px;
      font-weight:bold;
      color:#444;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:10px;
      margin-top:6px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:15px;
    }

    textarea{
      height:80px;
      resize:none;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:12px;
      background:#1d4ed8;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#123caa;
    }

    .footer-images{
      display:flex;
      justify-content:space-between;
      margin-top:20px;
      gap:10px;
    }

    .footer-images img{
      width:32%;
      height:90px;
      object-fit:cover;
      border-radius:8px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Top Banner Image -->
    <div class="banner">
      <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1" alt="School Banner">
    </div>

    <div class="content">

      <!-- Logo Image -->
      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="School Logo">
      </div>

      <h1>Radha Internations</h1>
      <h2>Student Registration Form</h2>

      <form>

        <label>Student Name</label>
        <input type="text" placeholder="Enter student name" required>

        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter mobile number" required>

        <label>Class</label>
        <select>
          <option>Select Class</option>
          <option>1st Class</option>
          <option>2nd Class</option>
          <option>3rd Class</option>
          <option>4th Class</option>
          <option>5th Class</option>
        </select>

        <label>Roll Number</label>
        <input type="number" placeholder="Enter roll number">

        <label>Email</label>
        <input type="email" placeholder="Enter email address">

        <label>Address</label>
        <textarea placeholder="Enter address"></textarea>

        <button type="submit">Submit</button>

      </form>

      <!-- Bottom Images -->
      <div class="footer-images">
        <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7" alt="">
        <img src="https://images.unsplash.com/photo-1513258496099-48168024aec0" alt="">
        <img src="https://images.unsplash.com/photo-1497486751825-1233686d5d80" alt="">
      </div>

    </div>
  </div>

</body>
</html>
